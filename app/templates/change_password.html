 <!DOCTYPE html>
 <html lang="en">
 
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>{{ translations.title_change_password }}</title>
     <link rel="icon" href="{{ url_for('static', filename='img/ilc_logo.png') }}" type="image/x-icon">
     <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
     <link rel="stylesheet" href="{{ url_for('static', filename='css/colors.css') }}">
     <link rel="stylesheet" href="{{ url_for('static', filename='css/font.css') }}">
     <link rel="stylesheet" href="{{ url_for('static', filename='css/main-content.css') }}">
     <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
     <link rel="stylesheet" href="{{ url_for('static', filename='css/toast.css') }}">
     <link rel="stylesheet" href="{{ url_for('static', filename='css/custom-dialog.css') }}">
 </head>
 
 <body>
     {% set nav_items = [] %}
     {% set show_mode_toggle = True %}
     {% set toolbar_style = 'nothing' %}
     {% include 'modules/menus.html' %}
     <div class="main">
         <div class="content">
             <form id="change-password-form" class="form">
                 <h2 class="form-title">{{ translations.change_password_title }}</h2>
 
                 <label for="new_password">{{ translations.change_password_new }}</label>
                 <div class="input-with-action">
                     <input type="password" name="new_password" id="new_password"
                         placeholder="{{ translations.change_password_new_placeholder }}" required>
                     <div id="toggle-new-password" class="input-secondary-action"
                         title="{{ translations.register_toggle_password_visibility }}">
                         <img id="new-password-icon" src="{{ url_for('static', filename='svg/action-eye-slash.svg') }}"
                             alt="Toggle visibility" class="action-icon">
                     </div>
                 </div>
 
                 <label for="confirm_password">{{ translations.change_password_confirm }}</label>
                 <div class="input-with-action">
                     <input type="password" name="confirm_password" id="confirm_password"
                         placeholder="{{ translations.change_password_confirm_placeholder }}" required>
                     <div id="toggle-confirm-password" class="input-secondary-action"
                         title="{{ translations.register_toggle_password_visibility }}">
                         <img id="confirm-password-icon" src="{{ url_for('static', filename='svg/action-eye-slash.svg') }}"
                             alt="Toggle visibility" class="action-icon">
                     </div>
                 </div>
 
                 <button type="submit" class="login-button">{{ translations.change_password_button }}</button>
                 <a href="{{ url_for('main.profile') }}" class="back-link">{{ translations.change_password_cancel }}</a>
             </form>
             <div id="toast" class="toast"></div>
         </div>
     </div>
 
     <script src="{{ url_for('static', filename='js/toast.js') }}"></script>
     <script src="{{ url_for('static', filename='js/password-toggle.js') }}"></script>
     <script src="{{ url_for('static', filename='js/form-validation.js') }}"></script>
     <script src="{{ url_for('static', filename='js/custom-dialog.js') }}"></script>
     <script src="{{ url_for('static', filename='js/change-password.js') }}"></script>
     <script>
         window.translations = {{ translations | tojson }};
     </script>
 </body>
 
 </html>
